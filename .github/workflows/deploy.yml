name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: realtorone-website-production
  cancel-in-progress: true

env:
  DEPLOY_PATH: /opt/realtorone-website

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy latest code on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST || '187.77.184.129' }}
          username: ${{ secrets.VPS_USER || 'root' }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            set -e

            if [ ! -d "${{ env.DEPLOY_PATH }}/.git" ]; then
              rm -rf "${{ env.DEPLOY_PATH }}"
              git clone https://github.com/${{ github.repository }}.git "${{ env.DEPLOY_PATH }}"
            fi

            cd "${{ env.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main || git checkout -b main origin/main
            git pull --ff-only origin main

            systemctl stop nginx || true
            systemctl disable nginx || true

            docker rm -f realtorone-website || true
            docker compose down --remove-orphans || true
            docker compose up -d --build --remove-orphans website
            docker image prune -af
            docker ps --filter name=realtorone-website

name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: realtorone-website-production
  cancel-in-progress: true

env:
  DEPLOY_PATH: /opt/realtorone-website

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy latest code on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 187.77.184.129
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          password: ${{ secrets.VPS_PASSWORD }}
          script_stop: true
          script: |
            set -e

            if [ ! -d "${{ env.DEPLOY_PATH }}/.git" ]; then
              rm -rf "${{ env.DEPLOY_PATH }}"
              git clone https://github.com/${{ github.repository }}.git "${{ env.DEPLOY_PATH }}"
            fi

            cd "${{ env.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main || git checkout -b main origin/main
            git pull --ff-only origin main

            systemctl stop nginx || true
            systemctl disable nginx || true

            docker rm -f realtorone-website || true
            docker compose -f compose.yaml down --remove-orphans || true
            docker compose -f compose.yaml up -d --build --remove-orphans website
            docker ps --filter name=realtorone-website

            if ! docker ps --format '{{.Names}}' | grep -q '^realtorone-website$'; then
              echo "realtorone-website failed to start. Recent logs:"
              docker compose -f compose.yaml logs --tail=120 website || true
              exit 1
            fi

            docker image prune -af || true
